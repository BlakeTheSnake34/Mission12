# Deploy ASP.NET Core API to Azure App Service (Windows or Linux).
#
# Setup (once):
# 1. Azure Portal → Create "Web App" → Runtime: .NET 10 (or closest available) / Linux recommended.
# 2. Web App → Get publish profile → Download.
# 3. GitHub repo → Settings → Secrets → Actions:
#    - AZURE_API_WEBAPP_NAME = your web app name (e.g. mission12-api)
#    - AZURE_API_PUBLISH_PROFILE = entire contents of the downloaded .PublishSettings file
#
name: Azure Web App — API

on:
  push:
    branches:
      - Phase06
    paths:
      - "backend/**"
      - ".github/workflows/azure-webapp-api.yml"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish backend/backend.csproj -c Release -o "${{ runner.temp }}/publish"

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/publish
